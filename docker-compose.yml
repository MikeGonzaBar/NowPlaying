services:
  api:
    build:
      context: ./API
      dockerfile: ./Dockerfile
    ports:
      - "${API_PORT:-8001}:8080"
    volumes:
      - ./API:/app
      - ./API/static:/app/static
    env_file:
      - ./API/.env
    environment:
      - PORT=8080
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - db
      - redis

  ui:
    build:
      context: ./UI/now-playing-ui
      dockerfile: ./Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8001}
    ports:
      - "${UI_PORT:-3200}:80"
    environment:
      - NODE_ENV=production

  db:
    build:
      context: ./DB
      dockerfile: ./Dockerfile
    restart: always
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    env_file:
      - ./DB/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:
